<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a2535"/>
    </linearGradient>
    <linearGradient id="letter" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Background with subtle gradient -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle border for depth -->
  <rect width="512" height="512" rx="108" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <!-- P with gradient fill, fill-rule evenodd cuts out the counter -->
  <path
    fill-rule="evenodd"
    fill="url(#letter)"
    d="
      M 116 80
      L 116 432
      L 210 432
      L 210 276
      L 300 276
      Q 404 276 404 178
      Q 404 80 300 80
      Z
      M 210 134
      L 288 134
      Q 352 134 352 178
      Q 352 222 288 222
      L 210 222
      Z
    "
  />
</svg>
